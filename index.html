<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tongits Metric Log Parser</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Tongits Metric Log Parser</h1>
            <p>Chuyển đổi file log máy chủ sang định dạng CSV dễ dàng.</p>
        </header>

        <main>
            <div id="drop-zone" class="drop-zone">
                <div class="drop-zone-content">
                    <div class="icon">📦</div>
                    <p>Kéo và thả file <strong>.zip</strong> vào đây</p>
                    <p>hoặc</p>
                    <label for="file-input" class="file-label">Chọn file</label>
                    <input type="file" id="file-input" accept=".zip" hidden>
                </div>
            </div>

            <div id="status-container" class="status-container hidden">
                <div class="loader"></div>
                <p id="status-text">Đang xử lý...</p>
            </div>

            <div id="result-container" class="result-container hidden">
                <div class="success-icon">✅</div>
                <h3>Xử lý hoàn tất!</h3>
                <p id="file-info"></p>
                <div class="actions">
                    <button id="download-btn" class="btn primary">Tải file CSV</button>
                    <button id="reset-btn" class="btn secondary">Làm mới</button>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Tongits Metric Tool. Hoàn toàn bảo mật (xử lý trên trình duyệt).</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
